name: Sync to Hugging Face

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify HF Token
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "❌ خطأ: الـ HF_TOKEN فارغ تماماً وغير معرف في GitHub Secrets!"
            exit 1
          else
            echo "✅ الـ Token موجود ومقروء من قِبل GitHub."
          fi

      - name: Install rsync
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync

      - name: Push To Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

          rm -rf hf_space

          git clone https://7atemmmmm:$HF_TOKEN@huggingface.co/spaces/7atemmmmm/titanx-beta hf_space

          rsync -av --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "hf_space" \
            ./ hf_space/

          cd hf_space
          git add .

          if ! git diff --cached --quiet; then
            git commit -m "Auto sync from GitHub"
            
            # 🌟 السطر السحري لتخطي مشكلة الـ LFS والملفات الكبيرة الناقصة
            git config lfs.allowincompletepush true
            
            git push origin main --force
          fi
