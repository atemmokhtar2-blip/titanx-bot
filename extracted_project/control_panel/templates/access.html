<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TitanX — لوحة التحكم</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎛️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap">
<link rel="stylesheet" href="/static/css/style.css">
<script>
(function(){
  const t = localStorage.getItem('titanx_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
})();
</script>
</head>
<body>

<div class="access-page">
  <!-- Animated orbs -->
  <div class="access-orbs">
    <div class="access-orb orb-1"></div>
    <div class="access-orb orb-2"></div>
    <div class="access-orb orb-3"></div>
  </div>

  <div class="access-card slide-up">

    <!-- Logo -->
    <div class="access-logo-wrap">
      <div class="access-logo-ring">
        <div class="access-logo-inner">🎛️</div>
      </div>
    </div>

    <!-- Brand -->
    <h1 class="access-title">TitanX</h1>
    <p class="access-sub">لوحة التحكم الاحترافية</p>

    {% if error %}
    <div class="access-alert access-alert-error">
      <span>⚠️</span>
      <span>{{ error }}</span>
    </div>
    {% endif %}

    <!-- Status -->
    <div class="access-status-box">
      <div class="access-status-row">
        <span class="access-status-icon">🔐</span>
        <div>
          <div class="access-status-label">نظام الحماية</div>
          <div class="access-status-value">رمز دخول خاص</div>
        </div>
        <span class="dot dot-green" style="margin-right:auto"></span>
      </div>
      <div class="access-status-row" style="margin-top:12px">
        <span class="access-status-icon">👑</span>
        <div>
          <div class="access-status-label">المعرف المصرح له</div>
          <div class="access-status-value"><code>{{ owner_id }}</code></div>
        </div>
      </div>
    </div>

    <!-- Instructions -->
    <div class="access-instructions">
      <p style="font-size:.8rem;color:var(--text2);margin-bottom:8px">للدخول، استخدم رابط الوصول الخاص بك المرسل من المطور</p>
    </div>

    <!-- Theme toggle -->
    <button class="access-theme-btn" onclick="toggleTheme()" title="تبديل الوضع">
      <span id="theme-icon">☀️</span>
    </button>

  </div>
</div>

<script src="/static/js/app.js"></script>
<script>
  const t = localStorage.getItem('titanx_theme') || 'dark';
  document.getElementById('theme-icon').textContent = t === 'dark' ? '☀️' : '🌙';
</script>
</body>
</html>
