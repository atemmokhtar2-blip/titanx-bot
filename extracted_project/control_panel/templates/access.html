<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#070c18">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>TitanX — لوحة التحكم</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎛️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap">
<link rel="stylesheet" href="/static/css/style.css?v={{ VER }}">
<script>
(function(){
  const t = localStorage.getItem('titanx_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
})();
</script>
<style>
/* ── Access page exclusive styles ── */
body { overflow: hidden; }

.access-page {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at 60% 30%, rgba(59,130,246,0.12) 0%, transparent 60%),
              radial-gradient(ellipse at 20% 80%, rgba(168,85,247,0.09) 0%, transparent 55%),
              var(--bg);
  padding: 24px;
  position: relative;
}

/* Animated orbs */
.access-orbs { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
.access-orb {
  position: absolute; border-radius: 50%;
  filter: blur(70px); opacity: 0.18;
  animation: orbFloat 14s ease-in-out infinite alternate;
}
.orb-1 { width: 420px; height: 420px; background: #3b82f6; top: -100px; right: -100px; animation-duration: 16s; }
.orb-2 { width: 340px; height: 340px; background: #a855f7; bottom: -80px; left: -60px; animation-duration: 12s; animation-delay: -5s; }
.orb-3 { width: 250px; height: 250px; background: #06b6d4; top: 50%; left: 40%; animation-duration: 10s; animation-delay: -3s; }
@keyframes orbFloat { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(30px,-40px) scale(1.08)} }

/* Card */
.access-card {
  position: relative; z-index: 1;
  background: var(--glass);
  backdrop-filter: blur(26px);
  -webkit-backdrop-filter: blur(26px);
  border: 1px solid var(--border2);
  border-radius: 28px;
  padding: 44px 38px 36px;
  width: 100%; max-width: 420px;
  box-shadow: 0 32px 80px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.07);
  animation: cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes cardIn { from { opacity:0; transform: translateY(32px) scale(0.94); } to { opacity:1; transform: none; } }

/* Logo */
.access-logo-wrap { display: flex; justify-content: center; margin-bottom: 24px; }
.access-logo-ring {
  width: 80px; height: 80px; border-radius: 24px;
  background: linear-gradient(135deg, rgba(59,130,246,0.18), rgba(168,85,247,0.18));
  border: 1.5px solid rgba(59,130,246,0.3);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 32px rgba(59,130,246,0.22), 0 8px 24px rgba(0,0,0,0.32);
  animation: logoSpin 4s ease-in-out infinite alternate;
}
@keyframes logoSpin { 0%{box-shadow:0 0 24px rgba(59,130,246,0.22)} 100%{box-shadow:0 0 44px rgba(168,85,247,0.38)} }
.access-logo-inner { font-size: 2.5rem; animation: logoBob 3s ease-in-out infinite alternate; }
@keyframes logoBob { 0%{transform:translateY(0) rotate(-4deg)} 100%{transform:translateY(-5px) rotate(4deg)} }

/* Text */
.access-title {
  text-align: center; font-size: 2rem; font-weight: 900; letter-spacing: -0.03em;
  background: linear-gradient(135deg, var(--accent2), var(--purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 5px;
}
.access-sub {
  text-align: center; color: var(--text2); font-size: .85rem; font-weight: 500;
  margin-bottom: 22px;
}

/* Alert */
.access-alert {
  display: flex; align-items: center; gap: 9px;
  padding: 12px 16px; border-radius: 12px;
  font-size: .85rem; margin-bottom: 18px;
}
.access-alert-error { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.28); color: #fca5a5; }

/* Status box */
.access-status-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px; padding: 18px 20px;
  margin-bottom: 22px;
}
.access-status-row { display: flex; align-items: center; gap: 14px; }
.access-status-icon { font-size: 1.4rem; flex-shrink: 0; }
.access-status-label { font-size: .72rem; color: var(--text3); font-weight: 600; margin-bottom: 2px; }
.access-status-value { font-size: .88rem; font-weight: 700; }

/* Instructions */
.access-instructions { text-align: center; margin-bottom: 18px; }

/* Footer */
.access-footer {
  display: flex; align-items: center; justify-content: center; gap: 14px;
  margin-top: 4px;
}
.access-version { font-size: .7rem; color: var(--text3); font-weight: 600; letter-spacing: 0.08em; }

/* Theme toggle */
.access-theme-btn {
  width: 38px; height: 38px; border-radius: 12px;
  background: var(--bg2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; cursor: pointer; transition: all 0.2s ease;
}
.access-theme-btn:hover { background: var(--bg3); transform: scale(1.1); }

/* Live dot */
.access-live {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: .68rem; font-weight: 700; color: var(--green);
}
.access-live::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); box-shadow: 0 0 8px rgba(34,197,94,0.8);
  animation: dotPulse 1.5s infinite; flex-shrink: 0;
}
@keyframes dotPulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.4);opacity:.6} }
</style>
</head>
<body>

<div class="access-page">
  <!-- Animated background orbs -->
  <div class="access-orbs">
    <div class="access-orb orb-1"></div>
    <div class="access-orb orb-2"></div>
    <div class="access-orb orb-3"></div>
  </div>

  <div class="access-card">

    <!-- Logo -->
    <div class="access-logo-wrap">
      <div class="access-logo-ring">
        <div class="access-logo-inner">🎛️</div>
      </div>
    </div>

    <!-- Brand -->
    <h1 class="access-title">TitanX</h1>
    <p class="access-sub">لوحة التحكم الاحترافية</p>

    {% if error %}
    <div class="access-alert access-alert-error">
      <span>⚠️</span>
      <span>{{ error }}</span>
    </div>
    {% endif %}

    <!-- Status block -->
    <div class="access-status-box">
      <div class="access-status-row">
        <span class="access-status-icon">🔐</span>
        <div style="flex:1">
          <div class="access-status-label">نظام الحماية</div>
          <div class="access-status-value">رمز دخول خاص</div>
        </div>
        <span class="dot dot-green"></span>
      </div>
      <div style="height:1px;background:var(--border);margin:14px 0"></div>
      <div class="access-status-row">
        <span class="access-status-icon">👑</span>
        <div style="flex:1">
          <div class="access-status-label">المعرف المصرح له</div>
          <div class="access-status-value"><code>{{ owner_id }}</code></div>
        </div>
        <span class="access-live">مباشر</span>
      </div>
    </div>

    <!-- Instructions -->
    <div class="access-instructions">
      <p style="font-size:.82rem;color:var(--text2);line-height:1.6">
        للدخول، استخدم رابط الوصول الخاص المرسل من المطور
      </p>
    </div>

    <!-- Footer -->
    <div class="access-footer">
      <span class="access-version">UI {{ UI_VERSION }} · Build {{ VER }}</span>
      <button class="access-theme-btn" onclick="toggleTheme()" title="تبديل الوضع">
        <span id="theme-icon">☀️</span>
      </button>
    </div>

  </div>
</div>

<script src="/static/js/app.js?v={{ VER }}"></script>
<script>
  const t = localStorage.getItem('titanx_theme') || 'dark';
  document.getElementById('theme-icon').textContent = t === 'dark' ? '☀️' : '🌙';
</script>
</body>
</html>
